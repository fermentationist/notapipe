<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
        <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f0e8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="notapipe" />
    <title>notapipe</title>
    <script>
      // Restore path encoded by 404.html for GitHub Pages SPA routing.
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get("p");
        if (p) {
          var q = params.get("q");
          var hash = window.location.hash;
          // Prepend the base path (e.g. /notapipe) that 404.html stripped from p.
          // Derived from the current pathname so this works with any base prefix.
          var base = window.location.pathname.replace(/\/$/, "");
          var restored = base + p + (q ? "?" + q : "") + hash;
          window.history.replaceState(null, "", restored);
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
