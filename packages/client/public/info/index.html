<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/app_icons/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/app_icons/icon-192x192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>notapipe</title>
    <script>
      // If opened as an installed PWA, go straight to the app.
      // The deferred change listener covers the desktop Chrome race where
      // display-mode transitions to standalone after initial script execution.
      var _mq = window.matchMedia("(display-mode: standalone)");
      if (_mq.matches) {
        location.replace("/");
      } else {
        _mq.addEventListener(
          "change",
          function (e) {
            if (e.matches) {
              location.replace("/");
            }
          },
          { once: true },
        );

        if ("launchQueue" in window) {
          window.launchQueue.setConsumer(function () {
            location.replace("/");
          });
        }

        // Pick a variant — stable within the session so refreshes don't reshuffle.
        var VARIANTS = [
          "a_baseline",
          "b_editorial",
          "c_terminal",
          "d_structured",
          "e_light",
        ];
        var KEY = "notapipe_info_variant";
        var chosen = sessionStorage.getItem(KEY);
        if (!chosen || !VARIANTS.includes(chosen)) {
          chosen = VARIANTS[Math.floor(Math.random() * VARIANTS.length)];
          sessionStorage.setItem(KEY, chosen);
        }
        location.replace("/info/variants/" + chosen + ".html");
      }
    </script>
  </head>
  <body></body>
</html>
