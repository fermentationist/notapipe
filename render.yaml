services:
  - type: web
    name: notapipe
    runtime: node
    plan: free
    # Build the client first, then start the signalling server which also serves the client
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @notapipe/client exec vite build
    startCommand: node --experimental-strip-types packages/signalling/src/index.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.22.2
      - key: PORT
        value: 10000
      # Bake the signalling server URL into the client bundle at build time.
      # Both this deployment and the GitHub Pages deployment point at the same server.
      - key: VITE_SIGNAL_URL
        value: wss://notapipe.onrender.com/ws
